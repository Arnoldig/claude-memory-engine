name: Tests

# Тесты на КАЖДЫЙ push и pull request.
#
# Зачем отдельно от publish.yml. До 0.11.0 сюита гонялась ТОЛЬКО при выпуске
# (`publish.yml`, триггер `on: release published`): пул-реквест вливался, ничего не
# проверив, и поломка всплывала уже на релизе — когда откатывать дороже всего. При этом
# всё выглядело нормально: зелёных галочек просто не было, а не было красных.
#
# Матрица версий. `pyproject.toml` обещает `requires-python = ">=3.9"`, а publish.yml гонял
# `python-version: "3.x"` — самую свежую. То есть обещание совместимости не проверял никто:
# синтаксис 3.10+ (например `X | Y` в аннотациях) прошёл бы зелёным и сломался бы у
# пользователя при установке — молча, на его стороне. Гоняем на САМОЙ СТАРОЙ заявленной и на
# самой свежей: между ними ломающих изменений синтаксиса не бывает.
# Инвариант «CI гоняет самую старую заявленную версию» закреплён тестом
# `tests/test_repo_invariants.py::test_ci_tests_the_oldest_supported_python`.

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.x"]
    name: pytest (Python ${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install --upgrade pip pytest
      - name: Run tests
        # Движок — чистый stdlib, ставить нечего: гоняем из корня репозитория.
        run: python -m pytest -q
