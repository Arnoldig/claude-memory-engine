name: Publish to PyPI

# Auto-publishes the package to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored anywhere.
# One-time setup on PyPI: project → Publishing → add a GitHub trusted publisher
# (owner: Arnoldig, repo: claude-memory-engine, workflow: publish.yml).

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run tests
        run: |
          python -m pip install --upgrade pip pytest build
          python -m pytest
      - name: Build distribution
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
